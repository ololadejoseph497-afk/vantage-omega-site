<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VANTAGEPRO Ω | ELECTRIC RIPPLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --spark: #bc13fe; --dark: #010409; }
        body { 
            background-color: var(--dark); 
            color: #fff; 
            font-family: 'Share Tech Mono', monospace; 
            margin: 0; 
            overflow: hidden; /* Prevents bounce lag on mobile */
            height: 100vh;
        }

        /* ELECTRIC RIPPLE BACKGROUND */
        .ripple-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
            background: radial-gradient(circle at center, #001520 0%, #010409 100%);
        }

        .ripple {
            position: absolute;
            border: 2px solid var(--neon);
            border-radius: 50%;
            transform: scale(0);
            animation: electricRipple 4s infinite;
            opacity: 0;
            box-shadow: 0 0 15px var(--neon), inset 0 0 10px var(--neon);
        }

        .ripple:nth-child(2) { animation-delay: 2s; border-color: var(--spark); box-shadow: 0 0 15px var(--spark); }

        @keyframes electricRipple {
            0% { transform: scale(0); opacity: 0.8; }
            50% { opacity: 0.4; border-style: dashed; } /* Spark effect */
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* INTERFACE BOXES */
        .cyber-card {
            background: rgba(0, 10, 20, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 8px;
        }

        .btn-electric {
            border: 1px solid var(--neon);
            color: var(--neon);
            background: rgba(0, 243, 255, 0.05);
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;
            transition: 0.2s;
        }
        .btn-electric:active { 
            background: var(--neon); 
            color: #000; 
            box-shadow: 0 0 30px var(--neon); 
        }

        .hidden { display: none !important; }
        .glow-cyan { text-shadow: 0 0 10px var(--neon); color: var(--neon); }
    </style>
</head>
<body>

    <div class="ripple-container">
        <div class="ripple" style="top: 50%; left: 50%; width: 400px; height: 400px; margin-left: -200px; margin-top: -200px;"></div>
        <div class="ripple" style="top: 50%; left: 50%; width: 400px; height: 400px; margin-left: -200px; margin-top: -200px;"></div>
    </div>

    <div class="h-full flex flex-col p-4 relative z-10">
        <header class="text-center py-4">
            <h1 class="text-2xl font-bold glow-cyan tracking-tighter">VANTAGEPRO Ω</h1>
            <p class="text-[8px] text-gray-500 tracking-[0.5em]">ELECTRIC_LIQUID_OS</p>
        </header>

        <nav class="flex gap-2 mb-4">
            <button onclick="tab('ai')" class="btn-electric flex-1 py-3 rounded">AI NODE</button>
            <button onclick="tab('pro')" class="btn-electric flex-1 py-3 rounded" style="border-color:var(--spark); color:var(--spark);">PRO HUB</button>
        </nav>

        <div id="ai-ui" class="cyber-card p-4 flex-grow flex flex-col overflow-hidden">
            <div id="log" class="flex-grow overflow-y-auto text-[11px] font-mono space-y-3 mb-4 pr-1">
                <p class="text-cyan-800">> RIPPLE CORE INITIALIZED...</p>
                <p class="text-cyan-400">> STANDBY FOR INPUT.</p>
            </div>
            <div class="flex gap-2 border-t border-cyan-900 pt-3">
                <input id="msg" type="text" class="bg-transparent flex-grow outline-none text-xs" placeholder="Command...">
                <button onclick="run()" class="glow-cyan font-bold text-xs">EXE</button>
            </div>
        </div>

        <div id="pro-lock" class="hidden cyber-card p-10 text-center my-auto">
            <h2 class="text-xl glow-cyan mb-4">LOCKED</h2>
            <input id="key" type="password" class="w-full bg-black/50 border border-cyan-900 p-4 rounded text-center mb-6 text-white" placeholder="ENTER PASSKEY">
            <button onclick="unlock()" class="btn-electric w-full py-4 rounded mb-6">DECRYPT</button>
            <a href="https://paystack.shop/pay/vantagepro-ai" class="text-[9px] underline text-gray-500">BUY ACCESS (N5,000)</a>
        </div>

        <div id="pro-ui" class="hidden space-y-3 overflow-y-auto">
            <div class="grid grid-cols-2 gap-2">
                <div class="cyber-card p-3"><h4 class="text-[8px] text-gray-500">BTC</h4><p id="btc" class="text-xs">---</p></div>
                <div class="cyber-card p-3"><h4 class="text-[8px] text-gray-500">ETH</h4><p id="eth" class="text-xs">---</p></div>
            </div>
            <div class="cyber-card p-4">
                <h3 class="text-xs glow-cyan mb-2">📊 DATA SCANNER</h3>
                <button class="btn-electric w-full py-2">UPLOAD EXCEL</button>
            </div>
            <div class="cyber-card p-4">
                <h3 class="text-xs text-purple-400 mb-2">⚖️ RISK CALC</h3>
                <input id="bal" type="number" placeholder="Balance $" class="w-full bg-black/40 p-2 text-xs border border-gray-800 mb-2">
                <button onclick="calc()" class="btn-electric w-full py-2">GET LOT SIZE</button>
                <p id="res" class="text-center text-xs mt-2 text-green-500"></p>
            </div>
            <div class="cyber-card p-4">
                <h3 class="text-xs glow-cyan mb-2">🐋 WHALE FEED</h3>
                <div id="whale" class="h-16 text-[8px] font-mono text-cyan-600 overflow-hidden"></div>
            </div>
            <div class="cyber-card p-4">
                <h3 class="text-xs glow-cyan mb-2">🧠 MARKET SENTIMENT</h3>
                <button onclick="sentiment()" class="btn-electric w-full py-2">SCAN BRAIN</button>
                <p id="s-out" class="text-[9px] mt-2 italic text-gray-400"></p>
            </div>
        </div>
    </div>

    <script>
        const API = "AIzaSyB0VdESBEqoLjeg5D-H2RNP_WWd2Y9Ov1w";
        const SHEET = "https://docs.google.com/spreadsheets/d/1TIf1Z7R-bLeavsHfC6GLoszM42N1iblpVL6s-ZLaFUU/export?format=csv";

        function tab(t) {
            document.getElementById('ai-ui').classList.toggle('hidden', t !== 'ai');
            document.getElementById('pro-lock').classList.toggle('hidden', t !== 'pro');
            document.getElementById('pro-ui').classList.add('hidden');
        }

        async function run() {
            const i = document.getElementById('msg');
            const l = document.getElementById('log');
            if(!i.value) return;
            l.innerHTML += `<p class="text-white mt-2">> ${i.value}</p>`;
            const prompt = i.value; i.value = "";
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API}`, {
                    method: "POST", headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({contents:[{parts:[{text:prompt}]}]})
                });
                const d = await r.json();
                l.innerHTML += `<p class="text-cyan-400 mt-1">> Ω: ${d.candidates[0].content.parts[0].text}</p>`;
            } catch(e) { l.innerHTML += `<p class="text-red-500 mt-1">> ERROR: CONNECTION LOST</p>`; }
            l.scrollTop = l.scrollHeight;
        }

        async function unlock() {
            const k = document.getElementById('key').value;
            const r = await fetch(SHEET);
            const d = await r.text();
            if(d.includes(k) && k.length > 3) {
                document.getElementById('pro-lock').classList.add('hidden');
                document.getElementById('pro-ui').classList.remove('hidden');
                startPro();
            } else { alert("ACCESS DENIED"); }
        }

        function calc() {
            const b = document.getElementById('bal').value;
            if(b) document.getElementById('res').innerText = "SUGGESTED LOT: " + (b*0.0001).toFixed(2);
        }

        function startPro() {
            setInterval(async () => {
                const b = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').then(r=>r.json());
                const e = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT').then(r=>r.json());
                document.getElementById('btc').innerText = "$" + parseFloat(b.price).toFixed(2);
                document.getElementById('eth').innerText = "$" + parseFloat(e.price).toFixed(2);
            }, 5000);
            const w = document.getElementById('whale');
            const ms = ["WHALE BUY: 1k BTC", "USDT TRANSFER: 50M", "SHORT LIQUIDATION", "ETH WHALE ALERT"];
            setInterval(() => { w.innerHTML = `<p>> ${ms[Math.floor(Math.random()*ms.length)]}</p>` + w.innerHTML; }, 3000);
        }

        async function sentiment() {
            const o = document.getElementById('s-out'); o.innerText = "Analyzing...";
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API}`, {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({contents:[{parts:[{text:"Market mood in 1 sentence."}]}]})
            });
            const d = await r.json();
            o.innerText = d.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
