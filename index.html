<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VantagePro Ω</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --lightning: #fff; --siri-1: #00f3ff; --siri-2: #8b5cf6; --ai-glow: #8b5cf6; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Poppins', sans-serif; height: 100vh; overflow: hidden; perspective: 2000px; }

        /* CONSTANT LIGHTNING BACKGROUND */
        #lightning-bg { position: fixed; inset: 0; background: #000; z-index: 1; pointer-events: none; opacity: 0; }
        @keyframes flash { 0%, 100% { opacity: 0; } 10%, 12% { opacity: 0.3; } 11% { opacity: 0.8; } }
        .lightning-active { animation: flash 4s infinite; }

        /* PIN SCREEN (Holographic) */
        #pin-screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transform-style: preserve-3d; transition: 0.1s; }
        .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--neon); margin: 0 10px; }
        .pin-dot.active { background: var(--neon); box-shadow: 0 0 20px var(--neon); }
        .key { width: 70px; height: 70px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; background: rgba(255,255,255,0.02); backdrop-filter: blur(5px); }
        
        /* SHATTER PARTICLES */
        .brick { position: absolute; background: rgba(0, 243, 255, 0.2); border: 1px solid rgba(255,255,255,0.1); pointer-events: none; z-index: 11000; }

        /* BREAKOUT LOGO & CRACKS */
        #breakout-stage { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9000; background: #000; }
        #cracks { position: absolute; inset: 0; opacity: 0; z-index: 9001; }
        .omega-logo { font-size: 180px; font-family: 'Orbitron'; color: var(--neon); opacity: 0; transform: translateZ(-1000px); text-shadow: 0 0 50px var(--neon); z-index: 9100; }
        .v-name { font-size: 28px; font-family: 'Orbitron'; letter-spacing: 1.2em; opacity: 0; transform: translateY(50px); margin-top: 30px; text-transform: uppercase; }

        /* SIRI LOADING */
        #siri-container { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 8000; background: #000; }
        .siri-orb { width: 220px; height: 4px; border-radius: 100px; background: linear-gradient(90deg, var(--siri-1), var(--siri-2), var(--siri-1)); background-size: 200% 100%; box-shadow: 0 0 40px var(--siri-1); }

        /* MAIN HUBS */
        #pro-hub, #ai-mode { display: none; height: 100vh; flex-direction: column; background: #020205; overflow-y: auto; opacity: 0; position: fixed; inset: 0; z-index: 7000; }
        #ai-mode { background: radial-gradient(circle at center, #1a0b2e 0%, #020205 100%); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .tool-card { padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        
        .mode-toggle { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 12000; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body onmousemove="handleTilt(event)">

    <div id="lightning-bg" class="lightning-active"></div>

    <div id="pin-screen">
        <h2 class="text-[9px] tracking-[1em] uppercase text-cyan-400 mb-12 font-black">Neural Entry Portal</h2>
        <div class="flex mb-10" id="dots">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="grid grid-cols-3 gap-6" id="keypad-grid">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div class="opacity-0">.</div><div class="key" onclick="press(0)">0</div><div class="opacity-0">.</div>
        </div>
    </div>

    <div id="breakout-stage">
        <svg id="cracks" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M50 50 L20 10 M50 50 L80 20 M50 50 L10 90 M50 50 L90 70 M50 50 L50 0 M50 50 L100 50" stroke="rgba(255,255,255,0.4)" stroke-width="0.3" fill="none" />
        </svg>
        <div class="omega-logo" id="main-logo">Ω</div>
        <div class="v-name" id="main-name">Vantage Ω</div>
    </div>

    <div id="siri-container">
        <div class="siri-orb" id="siri-bar"></div>
        <p class="mt-8 text-[8px] tracking-[0.8em] text-gray-400 uppercase font-black">Decrypting Secure Node</p>
    </div>

    <div id="pro-hub" class="p-6">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-xl font-black italic text-cyan-400 tracking-tighter uppercase" style="font-family: 'Orbitron';">Vantage Ω</h1>
            <button onclick="logout()" class="text-[8px] text-gray-600 border border-gray-800 px-3 py-1 rounded">Logout</button>
        </header>
        <div class="grid grid-cols-2 gap-4 pb-32">
            <div class="glass tool-card"><span>🎯</span><p class="text-[8px] font-black uppercase mt-2 text-purple-400">Whale Sniper</p></div>
            <div class="glass tool-card"><span>🕵️</span><p class="text-[8px] font-black uppercase mt-2 text-cyan-400">Insider Spy</p></div>
            <div class="glass tool-card"><span>🛡️</span><p class="text-[8px] font-black uppercase mt-2 text-emerald-400">Risk Engine</p></div>
            <div class="glass tool-card"><span>⚖️</span><p class="text-[8px] font-black uppercase mt-2 text-yellow-400">Tax Harvest</p></div>
            </div>
    </div>

    <div id="ai-mode" class="p-6">
        <h1 class="text-xl font-black italic text-purple-500 tracking-tighter uppercase mb-10" style="font-family: 'Orbitron';">NEURAL Ω</h1>
        <div class="glass p-10 text-center border-purple-500/30">
            <p class="text-[10px] text-purple-300 font-mono italic">"AI Sentinel active. Searching for liquidity clusters..."</p>
        </div>
    </div>

    <div id="toggle-container" class="mode-toggle">
        <button onclick="switchMode()" id="mode-btn" class="px-8 py-3 glass rounded-full text-[9px] font-black tracking-widest uppercase text-cyan-400 border-cyan-500/20">Switch to AI Mode</button>
    </div>

    <script>
        let pin = "";
        let master = "8888";
        let isAI = false;

        // SESSION CHECK (Auto-login)
        window.onload = () => {
            const expiry = localStorage.getItem('vantage_session');
            if (expiry && Date.now() < expiry) {
                directAccess();
            }
        };

        function handleTilt(e) {
            if (document.getElementById('pin-screen').style.display === 'none') return;
            const x = (window.innerWidth / 2 - e.pageX) / 45;
            const y = (window.innerHeight / 2 - e.pageY) / 45;
            gsap.to("#pin-screen", { rotateY: x, rotateX: -y, duration: 0.5 });
        }

        function press(n) {
            if (pin.length < 4) {
                pin += n;
                const dots = document.querySelectorAll('.pin-dot');
                dots[pin.length - 1].classList.add('active');
                if (pin.length === 4) {
                    if (pin === master) shatterAndBreak();
                    else setTimeout(() => { pin = ""; dots.forEach(d => d.classList.remove('active')); }, 300);
                }
            }
        }

        // 🧱 THE BRICK SHATTER EFFECT
        function shatterAndBreak() {
            // Store session for 1 hour
            localStorage.setItem('vantage_session', Date.now() + 3600000);
            
            const screen = document.getElementById('pin-screen');
            const rect = screen.getBoundingClientRect();
            
            // Create 60 "bricks"
            for(let i=0; i<60; i++) {
                let brick = document.createElement('div');
                brick.className = 'brick';
                let size = Math.random() * 40 + 20;
                brick.style.width = size + 'px';
                brick.style.height = size + 'px';
                brick.style.left = Math.random() * window.innerWidth + 'px';
                brick.style.top = Math.random() * window.innerHeight + 'px';
                document.body.appendChild(brick);

                gsap.to(brick, {
                    x: (Math.random() - 0.5) * 1500,
                    y: (Math.random() - 0.5) * 1500,
                    rotation: Math.random() * 720,
                    opacity: 0,
                    duration: 1.5,
                    ease: "power4.out",
                    onComplete: () => brick.remove()
                });
            }

            gsap.to("#pin-screen", { scale: 0.5, opacity: 0, duration: 0.5, ease: "power4.in", onComplete: triggerLogoSlam });
        }

        function triggerLogoSlam() {
            document.getElementById('pin-screen').style.display = 'none';
            document.getElementById('lightning-bg').classList.remove('lightning-active'); // Pause bg flash for slam
            const stage = document.getElementById('breakout-stage');
            stage.style.display = 'flex';

            const tl = gsap.timeline();
            tl.to("#main-logo", { opacity: 1, z: 0, scale: 1.5, duration: 0.5, ease: "back.out(3)" })
              .to("#lightning-bg", { opacity: 1, duration: 0.05, repeat: 3, yoyo: true }) // Slam lightning
              .to("#cracks", { opacity: 1, scale: 1.1, duration: 0.1 }, "-=0.5")
              .to("#main-name", { opacity: 1, y: 0, duration: 1 }, "-=0.1")
              .to(stage, { opacity: 0, duration: 0.8, delay: 2, onComplete: showSiri });
        }

        function showSiri() {
            document.getElementById('breakout-stage').style.display = 'none';
            const siri = document.getElementById('siri-container');
            siri.style.display = 'flex';
            gsap.to("#siri-bar", { scaleX: 1.3, repeat: -1, yoyo: true, duration: 0.6 });

            setTimeout(() => {
                gsap.to(siri, { opacity: 0, duration: 0.5, onComplete: () => {
                    siri.style.display = 'none';
                    directAccess();
                }});
            }, 2500);
        }

        function directAccess() {
            document.getElementById('pin-screen').style.display = 'none';
            document.getElementById('lightning-bg').style.display = 'none';
            const hub = document.getElementById('pro-hub');
            hub.style.display = 'flex';
            document.getElementById('toggle-container').style.display = 'block';
            gsap.to(hub, { opacity: 1, duration: 1 });
        }

        function switchMode() {
            isAI = !isAI;
            const hub = document.getElementById('pro-hub');
            const ai = document.getElementById('ai-mode');
            const btn = document.getElementById('mode-btn');

            if(isAI) {
                gsap.to(hub, { opacity: 0, duration: 0.4, onComplete: () => {
                    hub.style.display = 'none';
                    ai.style.display = 'flex';
                    gsap.to(ai, { opacity: 1, duration: 0.4 });
                    btn.innerText = "Switch to Pro Hub";
                    btn.style.color = "#8b5cf6";
                }});
            } else {
                gsap.to(ai, { opacity: 0, duration: 0.4, onComplete: () => {
                    ai.style.display = 'none';
                    hub.style.display = 'flex';
                    gsap.to(hub, { opacity: 1, duration: 0.4 });
                    btn.innerText = "Switch to AI Mode";
                    btn.style.color = "#00f3ff";
                }});
            }
        }

        function logout() {
            localStorage.removeItem('vantage_session');
            location.reload();
        }
    </script>
</body>
</html>
